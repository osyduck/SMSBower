name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  quality:
    name: Lint, typecheck, test, build, pack
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Contract typecheck
        run: npm run typecheck:contracts

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Pack dry-run
        run: npm run pack:check

  integration:
    name: Optional integration test
    needs: quality
    runs-on: ubuntu-latest
    continue-on-error: true
    if: ${{ secrets.SMSBOWER_API_KEY != '' && secrets.SMSBOWER_SERVICE != '' && secrets.SMSBOWER_COUNTRY != '' && secrets.SMSBOWER_PROVIDER_IDS != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run integration tests
        env:
          SMSBOWER_API_KEY: ${{ secrets.SMSBOWER_API_KEY }}
          SMSBOWER_SERVICE: ${{ secrets.SMSBOWER_SERVICE }}
          SMSBOWER_COUNTRY: ${{ secrets.SMSBOWER_COUNTRY }}
          SMSBOWER_PROVIDER_IDS: ${{ secrets.SMSBOWER_PROVIDER_IDS }}
        run: npm run test:integration
